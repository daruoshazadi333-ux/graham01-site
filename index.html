<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graham</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:linear-gradient(135deg,#0f172a,#1e1b4b);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
width:90%;
max-width:450px;
text-align:center;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:30px;
border-radius:25px;
box-shadow:0 0 25px rgba(124,58,237,.4);
}

.logo{
font-size:80px;
margin-bottom:10px;
}

h1{
font-size:40px;
margin-bottom:10px;
background:linear-gradient(90deg,#60a5fa,#a855f7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
opacity:.8;
margin-bottom:25px;
}

.btn{
display:block;
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:15px;
cursor:pointer;
font-size:17px;
font-weight:bold;
color:white;
background:linear-gradient(90deg,#2563eb,#7c3aed);
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

.version{
margin-top:20px;
opacity:.6;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">🤖</div>

<h1>Graham</h1>

<div class="subtitle">
دستیار هوشمند شما
</div>

<button class="btn">ورود به ربات</button>

<button class="btn">حساب کاربری</button>

<button class="btn">پنل مدیریت</button>

<button class="btn">اخبار و آپدیت‌ها</button>

<button class="btn">درباره ما</button>

<div class="version">
Version 1.0
</div>

</div>

</body>
</html>
