<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graham Login</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:tahoma}

body{
background:linear-gradient(135deg,#0f172a,#1e1b4b);
color:white;
min-height:100vh;
}

/* LOGIN */
.login-box{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

input{
width:250px;
padding:12px;
margin:8px;
border:none;
border-radius:10px;
outline:none;
}

.login-btn{
width:250px;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#2563eb,#7c3aed);
color:white;
font-weight:bold;
cursor:pointer;
}

/* APP */
.container{display:none;padding:20px;}

.page{display:none;}
.active{display:block;}

.card{
background:rgba(255,255,255,.06);
padding:20px;
border-radius:15px;
margin-top:15px;
backdrop-filter:blur(10px);
}

.btn{
display:block;
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
cursor:pointer;
background:linear-gradient(90deg,#2563eb,#7c3aed);
color:white;
font-weight:bold;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login-box">
<h2>ورود به Graham</h2>

<input id="user" placeholder="نام کاربری">
<input id="pass" type="password" placeholder="رمز عبور">

<button class="login-btn" onclick="login()">ورود</button>
</div>

<!-- APP -->
<div id="app" class="container">

<div id="home" class="page active">

<h1>Graham Panel</h1>

<div class="card">
<p>خوش آمدی 👋 <span id="username"></span></p>

<button class="btn" onclick="logout()">خروج</button>
<button class="btn" onclick="showPage('account')">حساب کاربری</button>
</div>

</div>

<div id="account" class="page">
<h2>حساب کاربری</h2>

<div class="card">
<p>نام: <span id="u2"></span></p>
<p>سطح: 12</p>
<p>امتیاز: 1540</p>
</div>

<button class="btn" onclick="showPage('home')">بازگشت</button>
</div>

</div>

<script>

// check login
if(localStorage.getItem("logged")=="true"){
showApp();
}

function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u.length<3 || p.length<3){
alert("نام کاربری یا رمز کوتاهه");
return;
}

localStorage.setItem("logged","true");
localStorage.setItem("user",u);

showApp();
}

function showApp(){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

let u=localStorage.getItem("user");

document.getElementById("username").innerText=u;
document.getElementById("u2").innerText=u;
}

function logout(){
localStorage.removeItem("logged");
localStorage.removeItem("user");
location.reload();
}

function showPage(id){
document.querySelectorAll('.page').forEach(p=>{
p.classList.remove('active');
});
document.getElementById(id).classList.add('active');
}

</script>

</body>
</html>
